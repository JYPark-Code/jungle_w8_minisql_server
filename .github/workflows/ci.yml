name: ci

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# ubuntu-latest 이미지에 이미 포함된 것:
#   - build-essential (gcc, make, g++, libc-dev 등)
#   - git, bash 기본 유틸
# → build / test / tsan 잡은 별도 apt install 불필요.
# valgrind 만 별도 설치 필요 — apt-get update 는 생략 (runner 이미지의
# apt 인덱스가 이미 fresh 해서 install 만으로 충분). 실패 시 fallback 추가.

jobs:
  # ---------------------------------------------------------------------------
  # build — 경고 0 으로 데몬 바이너리 생성
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain versions
        run: |
          gcc --version | head -1
          make --version | head -1

      - name: Build minisqld (warnings as errors)
        run: make CFLAGS="-Wall -Wextra -Wpedantic -Werror -std=c11 -O2 -g -I./include -I./src"

      - name: Verify binary
        run: test -x ./minisqld && ./minisqld --version

  # ---------------------------------------------------------------------------
  # test — W7 회귀 + 본인 파트 단위 테스트
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: make test

  # ---------------------------------------------------------------------------
  # tsan — ThreadSanitizer 빌드 (동시성 코드 검증)
  # ---------------------------------------------------------------------------
  tsan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with ThreadSanitizer
        run: make tsan

      - name: Verify TSan binary
        run: test -x ./minisqld_tsan

  # ---------------------------------------------------------------------------
  # valgrind — 메모리 누수 0 보장 (W7 + W8 테스트 회귀)
  #   valgrind 는 ubuntu-latest 이미지에 없음 → 설치 필요.
  #   apt-get update 는 생략하고 바로 install — 실패 시 update 후 재시도.
  # ---------------------------------------------------------------------------
  valgrind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install valgrind
        run: |
          sudo apt-get install -y valgrind \
            || { sudo apt-get update -qq && sudo apt-get install -y valgrind; }

      - name: Valgrind regression
        run: make valgrind
