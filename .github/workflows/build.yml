name: build & test

on:
  push:
    branches: [main, dev, dev2, dev3]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential valgrind

      - name: Show toolchain
        run: |
          gcc --version | head -1
          make --version | head -1

      - name: Skip if src/ missing
        id: check
        run: |
          if [ ! -d src ] || [ ! -f Makefile ]; then
            echo "src/ or Makefile not present — skipping build (likely dev base before parser merge)"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build (warnings as errors)
        if: steps.check.outputs.skip == 'false'
        run: make CFLAGS="-Wall -Wextra -Wpedantic -Werror -g -I./include"

      - name: Run unit tests
        if: steps.check.outputs.skip == 'false'
        run: make test

      - name: Valgrind (test runner, leak check)
        if: steps.check.outputs.skip == 'false'
        run: |
          valgrind --leak-check=full --error-exitcode=1 -q ./test_runner

      - name: Valgrind (sqlparser on query.sql)
        if: steps.check.outputs.skip == 'false'
        run: |
          if [ -f query.sql ]; then
            valgrind --leak-check=full --error-exitcode=1 -q ./sqlparser query.sql || true
          fi
