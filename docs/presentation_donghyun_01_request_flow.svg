<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" font-family="Pretendard, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', system-ui, sans-serif">
  <rect width="1200" height="420" fill="#ffffff"/>
  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#1f2937"/>
    </marker>
    <marker id="a1g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <text x="600" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2937">요청 전체 흐름 (Client → DB → JSON 응답)</text>
  <text x="600" y="72" text-anchor="middle" font-size="15" fill="#6b7280">각 파일은 한 가지 역할만 맡고, 응답은 역순으로 되돌아온다</text>

  <g>
    <rect x="30" y="140" width="135" height="85" rx="8" fill="#f3f4f6" stroke="#1f2937" stroke-width="2"/>
    <text x="97" y="175" text-anchor="middle" font-size="18" font-weight="600" fill="#1f2937">Client</text>
    <text x="97" y="200" text-anchor="middle" font-size="13" fill="#6b7280">브라우저/curl</text>
  </g>
  <line x1="165" y1="182" x2="200" y2="182" stroke="#1f2937" stroke-width="2" marker-end="url(#a1)"/>

  <g>
    <rect x="200" y="140" width="135" height="85" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="267" y="175" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">server.c</text>
    <text x="267" y="200" text-anchor="middle" font-size="13" fill="#1e40af">accept socket</text>
  </g>
  <line x1="335" y1="182" x2="370" y2="182" stroke="#1f2937" stroke-width="2" marker-end="url(#a1)"/>

  <g>
    <rect x="370" y="140" width="150" height="85" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="445" y="170" text-anchor="middle" font-size="18" font-weight="700" fill="#78350f">Thread Pool</text>
    <text x="445" y="194" text-anchor="middle" font-size="13" fill="#92400e">worker 가 꺼내</text>
    <text x="445" y="212" text-anchor="middle" font-size="13" fill="#92400e">요청 처리</text>
  </g>
  <line x1="520" y1="182" x2="555" y2="182" stroke="#1f2937" stroke-width="2" marker-end="url(#a1)"/>

  <g>
    <rect x="555" y="140" width="135" height="85" rx="8" fill="#e9d5ff" stroke="#7e22ce" stroke-width="2"/>
    <text x="622" y="170" text-anchor="middle" font-size="18" font-weight="700" fill="#581c87">protocol.c</text>
    <text x="622" y="194" text-anchor="middle" font-size="13" fill="#6b21a8">HTTP 문자열</text>
    <text x="622" y="212" text-anchor="middle" font-size="13" fill="#6b21a8">↔ 구조체</text>
  </g>
  <line x1="690" y1="182" x2="725" y2="182" stroke="#1f2937" stroke-width="2" marker-end="url(#a1)"/>

  <g>
    <rect x="725" y="140" width="135" height="85" rx="8" fill="#fce7f3" stroke="#be185d" stroke-width="2"/>
    <text x="792" y="170" text-anchor="middle" font-size="18" font-weight="700" fill="#831843">router.c</text>
    <text x="792" y="194" text-anchor="middle" font-size="13" fill="#9d174d">경로별 분배</text>
    <text x="792" y="212" text-anchor="middle" font-size="13" fill="#9d174d">+ cache 확인</text>
  </g>
  <line x1="860" y1="182" x2="895" y2="182" stroke="#1f2937" stroke-width="2" marker-end="url(#a1)"/>

  <g>
    <rect x="895" y="140" width="135" height="85" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
    <text x="962" y="170" text-anchor="middle" font-size="18" font-weight="700" fill="#064e3b">engine.c</text>
    <text x="962" y="194" text-anchor="middle" font-size="13" fill="#065f46">어댑터</text>
    <text x="962" y="212" text-anchor="middle" font-size="13" fill="#065f46">+ lock 정책</text>
  </g>
  <line x1="1030" y1="182" x2="1065" y2="182" stroke="#1f2937" stroke-width="2" marker-end="url(#a1)"/>

  <g>
    <rect x="1065" y="140" width="120" height="85" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="1125" y="170" text-anchor="middle" font-size="16" font-weight="700" fill="#7f1d1d">DB 엔진</text>
    <text x="1125" y="194" text-anchor="middle" font-size="13" fill="#991b1b">parser / exec</text>
    <text x="1125" y="212" text-anchor="middle" font-size="13" fill="#991b1b">B+Tree / Trie</text>
  </g>

  <path d="M 1125 240 Q 1125 300 600 300 Q 97 300 97 230" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#a1g)" stroke-dasharray="7 4"/>
  <text x="600" y="294" text-anchor="middle" font-size="16" font-weight="700" fill="#16a34a">JSON 응답 — 역순으로 되돌아감</text>

  <rect x="60" y="345" width="1080" height="55" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="600" y="378" text-anchor="middle" font-size="15" fill="#4b5563">예: GET /api/dict?english=apple → server.c accept → Thread Pool → protocol.c 파싱 → router.c /api/dict → engine.c SELECT → DB → 역순 응답</text>
</svg>
