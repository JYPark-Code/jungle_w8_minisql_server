    <text x="20" y="48" class="item">server.py</text>
    <text x="20" y="68" class="item">index.html</text>
    <text x="20" y="88" class="item">app.js</text>
    <text x="20" y="108" class="item">cursor-trail.js</text>
    <text x="160" y="48" class="note">stdlib HTTP + subprocess</text>
    <text x="160" y="68" class="note">Porsche 오마주 + Chart.js</text>
    <text x="160" y="88" class="note">/api/range · /api/compare</text>
    <text x="160" y="108" class="note">UI 디테일</text>
  </g>

  <!-- docs -->
  <g transform="translate(350,300)">
    <rect width="300" height="110" rx="10" fill="url(#g6)" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="16" y="24" class="group-title">🖼  docs/ — 발표 자료</text>
    <text x="20" y="48" class="item">architecture.svg</text>
    <text x="20" y="68" class="item">file-structure.svg</text>
    <text x="20" y="108" class="note">README 에서 참조되는 인포그래픽</text>
  </g>

  <!-- data -->
  <g transform="translate(670,300)">
    <rect width="290" height="110" rx="10" fill="url(#g7)" stroke="#ec4899" stroke-width="1.5"/>
    <text x="16" y="24" class="group-title">💾  data/ — 런타임 파일 (.gitignore)</text>
    <text x="20" y="48" class="item">schema/&lt;t&gt;.schema</text>
    <text x="20" y="68" class="item">tables/&lt;t&gt;.csv</text>
    <text x="20" y="88" class="item">tables/&lt;t&gt;.bin</text>
    <text x="150" y="48" class="note">컬럼 정의</text>
    <text x="150" y="68" class="note">가변 길이 호환</text>
    <text x="150" y="88" class="note">고정폭 fast path</text>
  </g>

  <!-- root configs -->
  <g transform="translate(40,430)">
    <rect width="920" height="100" rx="10" fill="url(#g8)" stroke="#64748b" stroke-width="1.5"/>
    <text x="16" y="24" class="group-title">🔧  루트 — 빌드 / CI / 팀 계약</text>
    <text x="20" y="48" class="item">Makefile</text>
    <text x="140" y="48" class="item">.github/workflows/</text>
    <text x="320" y="48" class="item">.devcontainer/</text>
    <text x="480" y="48" class="item">CLAUDE.md</text>
    <text x="620" y="48" class="item">agent.md</text>
    <text x="760" y="48" class="item">claude_jiyong.md</text>
    <text x="20" y="68" class="note">make / make test / make bench / make valgrind</text>
