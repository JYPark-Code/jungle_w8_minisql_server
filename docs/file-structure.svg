    <text x="20" y="48" class="item">main.c</text>
    <text x="20" y="68" class="item">parser.c</text>
    <text x="20" y="88" class="item">executor.c</text>
    <text x="20" y="108" class="item">storage.c</text>
    <text x="20" y="128" class="item">bptree.c</text>
    <text x="20" y="148" class="item">index_registry.c</text>
    <text x="20" y="168" class="item">ast_print.c</text>
    <text x="20" y="188" class="item">json_out.c</text>
    <text x="20" y="208" class="item">sql_format.c</text>
    <text x="160" y="48" class="note">entry point</text>
    <text x="160" y="68" class="note">tokenize + AST</text>
    <text x="160" y="88" class="note">index/range 분기</text>
    <text x="160" y="108" class="note">CSV + BIN + 캐시 5종</text>
    <text x="160" y="128" class="note">leaf/internal split</text>
    <text x="160" y="148" class="note">다중 테이블</text>
    <text x="160" y="168" class="note">Week 6 유지</text>
    <text x="160" y="188" class="note">Week 6 유지</text>
    <text x="160" y="208" class="note">Week 6 유지</text>
  </g>

  <!-- tests -->
  <g transform="translate(670,70)">
    <rect width="290" height="210" rx="10" fill="url(#g3)" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="16" y="24" class="group-title">🧪  tests/ — 회귀 방어</text>
    <text x="20" y="48" class="item">test_parser.c          208</text>
    <text x="20" y="68" class="item">test_executor.c</text>
    <text x="20" y="88" class="item">test_bptree.c           56</text>
    <text x="20" y="108" class="item">test_storage_insert.c</text>
    <text x="20" y="128" class="item">test_storage_delete.c</text>
    <text x="20" y="148" class="item">test_storage_update.c</text>
    <text x="20" y="168" class="item">test_index_registry.c   15</text>
    <text x="20" y="188" class="item">test_benchmark.c        17</text>
    <text x="20" y="208" class="note">CI 에서 valgrind 포함 자동 실행</text>
  </g>

  <!-- bench + scripts -->
  <g transform="translate(40,200)">
    <rect width="290" height="80" rx="10" fill="url(#g4)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="16" y="24" class="group-title">📈  bench/ · scripts/</text>
    <text x="20" y="48" class="item">bench/benchmark.c</text>
    <text x="20" y="68" class="item">scripts/gen_payments_fixture.py</text>
