<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" width="1000" height="540" font-family="Pretendard, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', system-ui, sans-serif">
  <rect width="1000" height="540" fill="#ffffff"/>

  <text x="500" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2937">Lock 정책 — Read / Write 분리</text>
  <text x="500" y="72" text-anchor="middle" font-size="15" fill="#6b7280">Thread Pool 은 요청의 병렬성을, Lock 은 DB 데이터 정합성을 담당한다</text>

  <g>
    <rect x="50" y="110" width="430" height="380" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
    <text x="265" y="150" text-anchor="middle" font-size="22" font-weight="700" fill="#1e3a8a">Read Lock (공유)</text>
    <text x="265" y="180" text-anchor="middle" font-size="16" fill="#1e40af">SELECT 계열 — 동시 실행 가능</text>

    <rect x="80" y="215" width="115" height="65" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="137" y="242" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Worker A</text>
    <text x="137" y="264" text-anchor="middle" font-size="13" fill="#1e40af">SELECT</text>

    <rect x="207" y="215" width="115" height="65" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="265" y="242" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Worker B</text>
    <text x="265" y="264" text-anchor="middle" font-size="13" fill="#1e40af">SELECT</text>

    <rect x="335" y="215" width="115" height="65" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="392" y="242" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Worker C</text>
    <text x="392" y="264" text-anchor="middle" font-size="13" fill="#1e40af">SELECT</text>

    <line x1="137" y1="280" x2="220" y2="340" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="265" y1="280" x2="265" y2="340" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="392" y1="280" x2="310" y2="340" stroke="#2563eb" stroke-width="1.5"/>

    <rect x="155" y="345" width="220" height="60" rx="6" fill="#93c5fd" stroke="#1e3a8a" stroke-width="2"/>
    <text x="265" y="375" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">dictionary 테이블</text>
    <text x="265" y="395" text-anchor="middle" font-size="12" fill="#1e3a8a">(read lock — 공유 허용)</text>

    <text x="265" y="440" text-anchor="middle" font-size="15" fill="#1e40af">여러 워커가 같은 데이터를</text>
    <text x="265" y="462" text-anchor="middle" font-size="16" font-weight="700" fill="#16a34a">동시에 읽어도 안전</text>
  </g>

  <g>
    <rect x="520" y="110" width="430" height="380" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5"/>
    <text x="735" y="150" text-anchor="middle" font-size="22" font-weight="700" fill="#7f1d1d">Write Lock (배타)</text>
    <text x="735" y="180" text-anchor="middle" font-size="16" fill="#991b1b">INSERT / UPDATE / DELETE</text>

    <rect x="550" y="215" width="115" height="65" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="1.5"/>
    <text x="607" y="242" text-anchor="middle" font-size="15" font-weight="700" fill="#7f1d1d">Worker A</text>
    <text x="607" y="264" text-anchor="middle" font-size="13" fill="#991b1b">INSERT</text>

    <rect x="677" y="215" width="115" height="65" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="735" y="242" text-anchor="middle" font-size="15" font-weight="700" fill="#6b7280">Worker B</text>
    <text x="735" y="264" text-anchor="middle" font-size="13" fill="#6b7280">대기</text>

    <rect x="805" y="215" width="115" height="65" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="862" y="242" text-anchor="middle" font-size="15" font-weight="700" fill="#6b7280">Worker C</text>
    <text x="862" y="264" text-anchor="middle" font-size="13" fill="#6b7280">대기</text>

    <line x1="607" y1="280" x2="680" y2="340" stroke="#dc2626" stroke-width="2.5"/>

    <rect x="625" y="345" width="220" height="60" rx="6" fill="#fca5a5" stroke="#7f1d1d" stroke-width="2"/>
    <text x="735" y="375" text-anchor="middle" font-size="17" font-weight="700" fill="#7f1d1d">dictionary 테이블</text>
    <text x="735" y="395" text-anchor="middle" font-size="12" fill="#7f1d1d">(write lock — 배타 소유)</text>

    <text x="735" y="440" text-anchor="middle" font-size="15" fill="#991b1b">한 번에 한 워커만 쓰기 가능</text>
    <text x="735" y="462" text-anchor="middle" font-size="16" font-weight="700" fill="#dc2626">다른 요청은 락 해제까지 대기</text>
  </g>
</svg>
