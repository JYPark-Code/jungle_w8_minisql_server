<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" width="1000" height="440" font-family="Pretendard, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', system-ui, sans-serif">
  <rect width="1000" height="440" fill="#ffffff"/>
  <defs>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#1f2937"/>
    </marker>
    <marker id="a2o" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#f97316"/>
    </marker>
  </defs>

  <text x="500" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2937">server.c — 요청 수신과 Thread Pool 위임</text>
  <text x="500" y="72" text-anchor="middle" font-size="15" fill="#6b7280">포트 8080 에서 accept 한 소켓을 바로 Thread Pool 에 넘긴다</text>

  <g>
    <rect x="40" y="140" width="170" height="110" rx="10" fill="#f3f4f6" stroke="#1f2937" stroke-width="2.5"/>
    <text x="125" y="185" text-anchor="middle" font-size="22" font-weight="600" fill="#1f2937">Client</text>
    <text x="125" y="215" text-anchor="middle" font-size="15" fill="#4b5563">브라우저 / curl</text>
  </g>

  <line x1="210" y1="195" x2="325" y2="195" stroke="#1f2937" stroke-width="2.5" marker-end="url(#a2)"/>
  <text x="267" y="180" text-anchor="middle" font-size="16" font-weight="600" fill="#1f2937">HTTP 요청</text>
  <text x="267" y="218" text-anchor="middle" font-size="15" fill="#6b7280">:8080</text>

  <g>
    <rect x="330" y="125" width="210" height="140" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
    <text x="435" y="165" text-anchor="middle" font-size="22" font-weight="700" fill="#1e3a8a">server.c</text>
    <text x="435" y="198" text-anchor="middle" font-size="17" fill="#1e40af">listen()</text>
    <text x="435" y="222" text-anchor="middle" font-size="17" fill="#1e40af">accept()</text>
    <text x="435" y="248" text-anchor="middle" font-size="14" fill="#1e40af">client socket 확보</text>
  </g>

  <line x1="540" y1="195" x2="660" y2="195" stroke="#f97316" stroke-width="3" marker-end="url(#a2o)"/>
  <text x="600" y="180" text-anchor="middle" font-size="16" font-weight="700" fill="#c2410c">client_fd</text>
  <text x="600" y="218" text-anchor="middle" font-size="15" fill="#c2410c">submit</text>

  <g>
    <rect x="665" y="125" width="290" height="140" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/>
    <text x="810" y="165" text-anchor="middle" font-size="22" font-weight="700" fill="#78350f">Thread Pool</text>
    <text x="810" y="198" text-anchor="middle" font-size="16" fill="#92400e">worker 가 꺼내서 실제 처리</text>
    <text x="810" y="224" text-anchor="middle" font-size="15" fill="#92400e">protocol → router → engine</text>
    <text x="810" y="248" text-anchor="middle" font-size="14" fill="#92400e">결과를 소켓으로 응답</text>
  </g>

  <rect x="110" y="310" width="780" height="90" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="500" y="342" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2937">핵심: server.c 는 요청을 직접 처리하지 않는다</text>
  <text x="500" y="370" text-anchor="middle" font-size="15" fill="#4b5563">accept() 로 받은 client socket 을 Thread Pool 에 넘기고,</text>
  <text x="500" y="390" text-anchor="middle" font-size="15" fill="#4b5563">바로 다음 접속을 받으러 돌아간다 — 그래야 다음 요청이 막히지 않는다</text>
</svg>
