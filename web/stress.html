<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>minisqld concurrency</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172026;
      --muted: #5f6b76;
      --line: #d9e0e6;
      --panel: #f7f9fb;
      --read: #256f5b;
      --single: #9a4d18;
      --accent: #265d9c;
      --bad: #a73737;
      --bg: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      width: min(1080px, calc(100vw - 32px));
      margin: 28px auto;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .status {
      min-width: 190px;
      text-align: right;
      color: var(--muted);
      font-size: 14px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin: 22px 0;
    }

    .tab {
      border: 1px solid var(--line);
      border-bottom-color: var(--ink);
      background: var(--ink);
      color: #fff;
      padding: 9px 12px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 650;
    }

    .workbench {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 650;
      color: var(--muted);
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      min-height: 132px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      font: 14px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: var(--ink);
      background: #fff;
    }

    input[type="range"] {
      width: 100%;
    }

    .row {
      margin-top: 16px;
    }

    .count-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .count-value {
      width: 54px;
      text-align: right;
      font-weight: 700;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      min-height: 42px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      cursor: wait;
      opacity: .68;
    }

    .results {
      display: grid;
      gap: 14px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 15px;
      background: #fff;
    }

    .metric-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-weight: 700;
    }

    .metric small {
      color: var(--muted);
      font-weight: 600;
    }

    .bar-track {
      height: 16px;
      border-radius: 4px;
      background: #e8edf1;
      overflow: hidden;
      margin-top: 12px;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: var(--read);
      transition: width .18s ease;
    }

    .bar.single {
      background: var(--single);
    }

    .error {
      color: var(--bad);
      font-size: 14px;
      min-height: 20px;
      margin-top: 14px;
    }

    @media (max-width: 760px) {
      main {
        width: min(100vw - 20px, 680px);
        margin-top: 18px;
      }

      header,
      .workbench {
        display: block;
      }

      .status {
        text-align: left;
        margin-top: 8px;
      }

      .results {
        margin-top: 18px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>minisqld concurrent stress</h1>
      <div id="status" class="status">Ready</div>
    </header>

    <nav class="tabs" aria-label="Demo tabs">
      <button class="tab" type="button">Concurrent Stress</button>
    </nav>

    <section class="workbench">
      <form id="stress-form" class="panel">
        <label for="sql-input">SQL</label>
        <textarea id="sql-input" spellcheck="false">SELECT * FROM users WHERE id = 1</textarea>

        <div class="row">
          <div class="count-row">
            <label for="request-count">Concurrent requests</label>
            <span id="count-value" class="count-value">16</span>
          </div>
          <input id="request-count" type="range" min="1" max="64" value="16">
        </div>

        <div class="row">
          <button id="run-button" type="submit">Run comparison</button>
        </div>

        <div id="error" class="error" role="status" aria-live="polite"></div>
      </form>

      <section class="results" aria-label="Stress results">
        <article class="metric">
          <div class="metric-head">
            <span>Multi mode</span>
            <small id="multi-summary">0 ms</small>
          </div>
          <div class="bar-track"><div id="multi-bar" class="bar"></div></div>
        </article>

        <article class="metric">
          <div class="metric-head">
            <span>Single mode</span>
            <small id="single-summary">0 ms</small>
          </div>
          <div class="bar-track"><div id="single-bar" class="bar single"></div></div>
        </article>
      </section>
    </section>
  </main>

  <script>
    const form = document.getElementById("stress-form");
    const sqlInput = document.getElementById("sql-input");
    const countInput = document.getElementById("request-count");
    const countValue = document.getElementById("count-value");
    const runButton = document.getElementById("run-button");
    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");
    const multiSummary = document.getElementById("multi-summary");
    const singleSummary = document.getElementById("single-summary");
    const multiBar = document.getElementById("multi-bar");
    const singleBar = document.getElementById("single-bar");

    countInput.addEventListener("input", () => {
      countValue.textContent = countInput.value;
    });

    async function postSql(path, sql) {
      const response = await fetch(path, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: sql
      });
      const text = await response.text();
      return { ok: response.ok, text };
    }

    async function runBatch(path, sql, count) {
      const started = performance.now();
      const jobs = Array.from({ length: count }, () => postSql(path, sql));
      const settled = await Promise.allSettled(jobs);
      const elapsed = performance.now() - started;
      const okCount = settled.filter((item) => item.status === "fulfilled" && item.value.ok).length;
      return { elapsed, okCount };
    }

    function renderResult(target, summary, result, maxMs, count) {
      const elapsed = Math.round(result.elapsed);
      const width = maxMs > 0 ? Math.max(4, Math.round((elapsed / maxMs) * 100)) : 0;
      summary.textContent = `${elapsed} ms, ${result.okCount}/${count} ok`;
      target.style.width = `${Math.min(width, 100)}%`;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const sql = sqlInput.value.trim();
      const count = Number(countInput.value);

      if (!sql) {
        errorEl.textContent = "SQL is empty.";
        return;
      }

      errorEl.textContent = "";
      runButton.disabled = true;
      statusEl.textContent = "Running";

      try {
        const multi = await runBatch("/api/query", sql, count);
        const single = await runBatch("/api/query?mode=single", sql, count);
        const maxMs = Math.max(multi.elapsed, single.elapsed);
        renderResult(multiBar, multiSummary, multi, maxMs, count);
        renderResult(singleBar, singleSummary, single, maxMs, count);
        statusEl.textContent = "Complete";
      } catch (error) {
        errorEl.textContent = error.message || "Request failed.";
        statusEl.textContent = "Failed";
      } finally {
        runButton.disabled = false;
      }
    });
  </script>
</body>
</html>
